<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Alert Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: flex-start; justify-content: flex-end;
    padding: 20px;
    min-height: 100vh;
    overflow: hidden;
  }

  .alert-box {
    background: rgba(15,15,15,0.92);
    color: #fff;
    border-radius: 16px;
    padding: 18px 22px;
    min-width: 280px;
    max-width: 380px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    transform: translateY(-20px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .alert-box.show {
    transform: translateY(0);
    opacity: 1;
  }

  .alert-box.hide {
    transform: translateY(-20px);
    opacity: 0;
    transition: all 0.3s ease-in;
  }

  .alert-icon { font-size: 32px; flex-shrink: 0; }

  .alert-content {}
  .alert-title { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
  .alert-title span { color: #ffd700; }
  .alert-msg { font-size: 13px; opacity: 0.7; line-height: 1.4; }

  .progress-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.15); border-radius: 0 0 16px 16px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #ffd700, #ff9500);
    transition: width linear;
  }

  /* OBS chroma key helper — set OBS filter to chroma key green */
  body.chroma { background: #00b140; }
</style>
</head>
<body>

<div class="alert-box" id="alertBox" style="position:relative;">
  <div class="alert-icon" id="alertIcon">🎉</div>
  <div class="alert-content">
    <div class="alert-title" id="alertTitle">ชื่อ <span id="alertAmount">฿0</span></div>
    <div class="alert-msg" id="alertMsg"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:100%"></div></div>
</div>

<audio id="alertSound" preload="auto">
  <!-- ไม่ได้ฝัง audio จริง — ใช้ Web Audio API แทน -->
</audio>

<script>
  let lastDonation = null;
  let hideTimer = null;

  function playChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const freqs = [523, 659, 784, 1047];
      freqs.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
        gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i * 0.12 + 0.05);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.12 + 0.4);
        osc.start(ctx.currentTime + i * 0.12);
        osc.stop(ctx.currentTime + i * 0.12 + 0.5);
      });
    } catch(e) {}
  }

  function showAlert(donation) {
    const box = document.getElementById('alertBox');
    const DURATION = 6000;

    document.getElementById('alertTitle').innerHTML =
      `<span style="color:#ffd700">${donation.name}</span> โดเนท ฿${donation.amount.toLocaleString()}`;
    document.getElementById('alertMsg').textContent = donation.msg || '';
    document.getElementById('alertIcon').textContent =
      donation.amount >= 500 ? '🎊' : donation.amount >= 200 ? '⭐' : '🎉';

    box.classList.remove('hide');
    box.classList.add('show');

    const fill = document.getElementById('progressFill');
    fill.style.transition = 'none';
    fill.style.width = '100%';
    setTimeout(() => {
      fill.style.transition = `width ${DURATION}ms linear`;
      fill.style.width = '0%';
    }, 50);

    playChime();

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      box.classList.remove('show');
      box.classList.add('hide');
    }, DURATION);
  }

  function checkNewDonation() {
    try {
      const raw = localStorage.getItem('latest_donation');
      if (!raw) return;
      const donation = JSON.parse(raw);
      if (!lastDonation || donation.id !== lastDonation.id) {
        lastDonation = donation;
        showAlert(donation);
      }
    } catch(e) {}
  }

  // Poll every 1s
  setInterval(checkNewDonation, 1000);
  checkNewDonation();
</script>
</body>
</html>
